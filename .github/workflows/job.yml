name: 自动监控系统

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 🇨🇳 北京时间早上9点

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 运行 Python 脚本
        id: run_script
        run: |
          python monitor.py
        continue-on-error: true

      # ✅ 成功通知
      - name: 成功时发送企业微信通知
        if: steps.run_script.outcome == 'success'
        run: |
          curl -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
                "msgtype": "markdown",
                "markdown": {
                  "content": "## ✅ 监控正常\n> 状态：**成功** ✔️\n> 仓库：${{ github.repository }}\n> 时间：北京时间 9:00 定时任务\n> 查看日志：${{ github.server_url }}/${{ github.repository }}/actions"
                }
              }'

      # ❌ 失败通知
      - name: 失败时发送企业微信通知
        if: steps.run_script.outcome == 'failure'
        run: |
          curl -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
                "msgtype": "markdown",
                "markdown": {
                  "content": "## 🚨 监控报警\n> 状态：**失败** ❌\n> 仓库：${{ github.repository }}\n> 时间：北京时间 9:00 定时任务\n> 查看日志：${{ github.server_url }}/${{ github.repository }}/actions"
                }
              }'
