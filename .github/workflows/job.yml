name: Run Python Job

on:
  schedule:
    - cron: '0 2 * * *'   # 每天上午10点（北京时间）
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python job.py
