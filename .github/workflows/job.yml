- name: 发送企业微信通知
  if: always()
  run: |
    if [ "${{ job.status }}" == "success" ]; then
      STATUS="成功 ✅"
    else
      STATUS="失败 ❌"
    fi

    curl -X POST "${{ secrets.WECHAT_WEBHOOK }}" \
    -H "Content-Type: application/json" \
    -d "{
      \"msgtype\": \"markdown\",
      \"markdown\": {
        \"content\": \"## 🚨 监控通知\n\n状态：**$STATUS**\n\n仓库：${{ github.repository }}\n\n时间：北京时间 9:00 定时任务\"
      }
    }"
