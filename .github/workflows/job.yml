name: Job Monitor

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 9:00
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 运行 Python
        run: |
          python job.py
